    <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <span class="nav-logo">GMN/DMR</span>

    </nav>
    <header class="hero" style="min-height: 50vh;">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">Stereocastro</h1>
            <p class="hero-subtitle">Canal de YouTube · 16 vídeos</p>
            <div class="hero-buttons">
                <a href="https://www.youtube.com/@stereocastro" target="_blank" rel="noopener" class="btn btn-primary">Ver en YouTube</a>
            </div>
        </div>
    </header>
    <main class="container">
        <section class="canal">
            <div class="canal-header">
                <div class="canal-info">
                    <h2>Stereocastro</h2>
                    <p class="canal-desc">Sesiones y experimentos sonoros. Ordenados por día.</p>
                    <div class="canal-links">
                        <a href="https://www.youtube.com/@stereocastro" target="_blank" rel="noopener" class="soundcloud-link">📺 YouTube</a>
                    </div>
                </div>
            </div>
            <h3 class="tracks-title">Vídeos</h3>
            <div class="tracks-grid" id="tracks-stereocastro"></div>
        </section>
    </main>
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 GoodMakingNoise & DeepMakingRhythm</p>
            <div class="footer-links">
                <a href="https://soundcloud.com/goodmakingnoise" target="_blank" rel="noopener">GoodMakingNoise</a>

                <a href="https://www.youtube.com/@stereocastro" target="_blank" rel="noopener">Stereocastro</a>
            </div>
        </div>
    </footer>
    <script>
        const videos=[{title:"Stereocastro day6_t1",id:"U6GlS_ciaVs"},{title:"Stereocastro day6_t2",id:"TeEOe5ExCDA"},{title:"Stereocastro day12_t3",id:"GoHzt-PgzPk"},{title:"Stereocastro day19",id:"3JHUEKB88fw"},{title:"Stereocastro day22_t1",id:"8TQqy1kYojE"},{title:"Stereocastro day22_t2",id:"Mg9n7lojtf4"},{title:"Stereocastro day22_t3",id:"eTGUV6TL_64"},{title:"Stereocastro day25_t1",id:"6-0oRIKhZUM"},{title:"Stereocastro day25_t2",id:"AS0vs1wGOj4"},{title:"Stereocastro day25_t3",id:"z7LUOAkgkOQ"},{title:"Stereocastro day26_t1",id:"y79beTuy_aY"},{title:"Stereocastro day26_t2",id:"GfUcYqDR7vM"},{title:"Stereocastro day27",id:"cgjY83b7h9M"},{title:"Stereocastro day31_t1",id:"oo2eSI1VNG8"},{title:"Stereocastro day31_t2",id:"KlKXEZhTYTU"},{title:"Stereocastro day31_t3",id:"jgClBhHFu88"}];
        document.addEventListener("DOMContentLoaded",function(){
            const c=document.getElementById("tracks-stereocastro");
            if(!c)return;
            c.innerHTML="";
            videos.forEach(function(v){
                const w=document.createElement("div");
                w.className="track-item";
                const f=document.createElement("iframe");
                f.src="https://www.youtube.com/embed/"+v.id;
                f.width="100%";
                f.height="200";
                f.frameBorder="no";
                f.allow="autoplay; encrypted-media";
                f.allowFullscreen=true;
                f.loading="lazy";
                f.title=v.title;
                const t=document.createElement("p");
                t.className="track-title";
                t.textContent=v.title;
                w.appendChild(f);
                w.appendChild(t);
                c.appendChild(w);
            });
        });
    </script>
</body>
</html>
